spring.application.name=instant-payments-core

# Kafka Serializers
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.byteentropy.*

# Default Broker
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Outbound Topic Configuration (New)
app.kafka.topics.fps-outbound=fps-outbound-requests
app.kafka.topics.sepa-outbound=sepa-outbound-requests
app.kafka.topics.fast-outbound=fast-outbound-requests

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/paymentdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# --- CLOUD PROFILE ---
spring.config.activate.on-profile=cloud
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username='${KAFKA_KEY}' password='${KAFKA_SECRET}';