spring.main.allow-bean-definition-overriding=true

# Force test to use Embedded Kafka
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}
spring.kafka.admin.properties.bootstrap.servers=${spring.embedded.kafka.brokers}

# Outbound Topic Configuration for Tests
app.kafka.topics.fps-outbound=fps-outbound-test
app.kafka.topics.sepa-outbound=sepa-outbound-test
app.kafka.topics.fast-outbound=fast-outbound-test

# Serializers
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Package Trust
spring.kafka.consumer.properties.spring.json.trusted.packages=com.byteentropy.*

# Consumer Configuration
spring.kafka.consumer.group-id=payment-test-group
spring.kafka.consumer.auto-offset-reset=earliest

# Database Isolation (In-Memory for speed)
spring.datasource.url=jdbc:h2:mem:payment_test_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

logging.level.org.springframework.kafka=WARN